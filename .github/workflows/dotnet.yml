name: dotnet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\AgentLearningLab.sln

      - name: Build
        run: dotnet build .\AgentLearningLab.sln --no-restore

      - name: Test
        run: dotnet test .\AgentLearningLab.sln --no-build

      - name: Run offline evaluations
        run: dotnet run --project .\evals\AgentLearningLab.Evals --no-build
